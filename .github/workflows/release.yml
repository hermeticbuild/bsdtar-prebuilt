name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build_all:
    uses: ./.github/workflows/build.yaml
  release:
    runs-on: ubuntu-latest
    needs: build_all
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - run: shasum -a 256 tar* > SHA256.txt
      - run: gh release create "${GITHUB_REF_NAME}" tar* SHA256.txt --verify-tag --generate-notes --repo "${GITHUB_REPOSITORY}"
        env:
          GH_TOKEN: ${{ github.token }}
